<div class="text-center mt-5">
    <h2>{{ include.title }}</h2>
    <iframe
        width="100%"
        height="166"
        scrolling="no"
        frameborder="no"
        allow="autoplay"
        title="{{ include.title }}"
        src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%{{ include.id }}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"
    ></iframe>
    <div class="small text-body-secondary text-truncate">
        <a
            href="https://soundcloud.com/d-bora-groupe-rock"
            title="D-BORA"
            target="_blank"
            class="text-body-secondary text-decoration-none"
            >D-BORA</a>
        ·
        <a
            href="https://soundcloud.com/d-bora-groupe-rock"
            title="{{ include.title }}"
            target="_blank"
            class="text-body-secondary text-decoration-none"
            >{{ include.title }}</a>
    </div>
</div>
